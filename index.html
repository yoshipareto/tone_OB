<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-title">申し込みフォーム</title>
<style>
  :root {
    --bg:#fafaf8;--surface:#ffffff;--border:#e4e2dc;
    --text:#1a1917;--text-muted:#6b6860;--text-hint:#a09d96;
    --accent:#2d5be3;--accent-bg:#eef2fd;
    --success:#1a7a4a;--success-bg:#e8f7ef;
    --danger:#c0392b;--danger-bg:#fdf0ee;
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:56px;}
  .logo{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
  .logo span{color:var(--accent);}
  main{max-width:640px;margin:0 auto;padding:40px 24px 80px;}
  .form-header{margin-bottom:32px;}
  .form-header h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
  .form-header p{color:var(--text-muted);font-size:14px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
  .field label .req{color:var(--danger);margin-left:3px;}
  .field label .hint{font-weight:400;color:var(--text-hint);margin-left:6px;font-size:12px;}
  .field input,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.1);}
  .field input.error,.field textarea.error{border-color:var(--danger);}
  .field textarea{resize:vertical;min-height:80px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:500px){.row2{grid-template-columns:1fr;}}
  .section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-hint);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:500px){.member-grid{grid-template-columns:1fr;}}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;}
  .checkbox-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);}
  .checkbox-row span{font-size:14px;}
  .unavail-note{font-size:13px;color:var(--text-muted);margin-bottom:8px;}
  .submit-btn{width:100%;margin-top:28px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .submit-btn:hover{opacity:.88;}
  .toast{display:none;margin-top:14px;padding:12px 16px;background:var(--success-bg);color:var(--success);border:1px solid #a8dfc0;border-radius:var(--radius);font-size:14px;font-weight:500;}
  .error-msg{display:none;margin-top:14px;padding:12px 16px;background:var(--danger-bg);color:var(--danger);border:1px solid #f0b8b2;border-radius:var(--radius);font-size:14px;}
</style>
</head>
<body>
<header>
  <div class="logo">🎵 <span id="header-title">OBOGライブ~延長戦~</span></div>
</header>
<main>
  <div class="form-header">
    <h1 id="form-h1">出演申し込みフォーム</h1>
    <p>必須項目（<span style="color:var(--danger)">*</span>）をすべてご入力のうえ送信してください。</p>
  </div>

  <div class="section-label">バンド情報</div>
  <div class="field">
    <label>バンド名 <span class="req">*</span></label>
    <input type="text" id="f-band" placeholder="例：ハーモニーズ" />
  </div>

  <div class="field">
    <label>出演できない時間帯 <span class="req">*</span></label>
    <label class="checkbox-row">
      <input type="checkbox" id="f-allfree" onchange="toggleUnavail()" />
      <span>全日出演可（時間帯の制約なし）</span>
    </label>
    <div id="unavail-text-wrap">
      <p class="unavail-note">出演できない時間帯があれば自由にご記入ください。</p>
      <textarea id="f-unavail" placeholder="例：13:00〜14:00は授業があるため出演不可"></textarea>
    </div>
  </div>

  <div class="section-label">代表者情報</div>
  <div class="row2">
    <div class="field">
      <label>代表者名（トーンネーム） <span class="req">*</span></label>
      <input type="text" id="f-rep" placeholder="あんころ" />
    </div>
    <div class="field">
      <label>代表者メールアドレス <span class="req">*</span></label>
      <input type="email" id="f-email" placeholder="example@email.com" />
    </div>
  </div>

  <div class="section-label">バンドメンバー（記入例：21あんころ）</div>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;"></p>
  <div class="member-grid" id="member-grid"></div>
  <div id="extra-fields-form"></div>

  <button class="submit-btn" onclick="submitForm()">申し込む →</button>
  <div class="toast" id="toast">✓ 申し込みを受け付けました！</div>
  <div class="error-msg" id="err-msg"></div>
</main>
<script>
const DEFAULT_CONFIG={title:'アカペラ発表会',password:'admin1234',maxMembers:6,extraFields:[]};
let config=Object.assign({},DEFAULT_CONFIG,JSON.parse(localStorage.getItem('acappella_v2_config')||'{}'));
let bands=JSON.parse(localStorage.getItem('acappella_v2_bands')||'[]');
function saveData(){try{localStorage.setItem('acappella_v2_bands',JSON.stringify(bands));}catch(e){}}

function init(){
  document.getElementById('page-title').textContent=config.title+' 申し込みフォーム';
  document.getElementById('header-title').textContent=config.title;
  document.getElementById('form-h1').textContent=config.title+' 出演申し込みフォーム';
  renderMemberFields();
  renderExtraFieldsForm();
}

function renderMemberFields(){
  const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
  let html='';
  for(let i=1;i<=config.maxMembers;i++){
    const req=i<=2;
    html+=`<div class="field"><label>${nums[i-1]} トーンネーム ${req?'<span class="req">*</span>':'<span class="hint">任意</span>'}</label><input type="text" id="m${i}" placeholder="${req?'21あんころ'}" /></div>`;
  }
  document.getElementById('member-grid').innerHTML=html;
}

function renderExtraFieldsForm(){
  const wrap=document.getElementById('extra-fields-form');
  if(!config.extraFields.length){wrap.innerHTML='';return;}
  let html='<div class="section-label">その他</div>';
  config.extraFields.forEach(f=>{
    html+=`<div class="field"><label>${esc(f.label)}${f.required?' <span class="req">*</span>':' <span class="hint">任意</span>'}</label><textarea id="ef-${f.id}" placeholder="自由にご記入ください"></textarea></div>`;
  });
  wrap.innerHTML=html;
}

function toggleUnavail(){
  document.getElementById('unavail-text-wrap').style.display=document.getElementById('f-allfree').checked?'none':'block';
}

function submitForm(){
  const band=v('f-band');
  const allfree=document.getElementById('f-allfree').checked;
  const unavail=allfree?'全日出演可':v('f-unavail');
  const rep=v('f-rep');
  const email=v('f-email');
  let errs=[];
  setErr('f-band',!band,errs,'バンド名');
  if(!allfree)setErr('f-unavail',!unavail,errs,'出演できない時間帯');
  setErr('f-rep',!rep,errs,'代表者名');
  setErr('f-email',!email,errs,'メールアドレス');
  setErr('m1',!v('m1'),errs,'メンバー①');
  setErr('m2',!v('m2'),errs,'メンバー②');
  config.extraFields.forEach(f=>{
    const el=document.getElementById('ef-'+f.id);
    if(f.required&&el&&!el.value.trim()){el.classList.add('error');errs.push(f.label);}else if(el)el.classList.remove('error');
  });
  if(errs.length){const em=document.getElementById('err-msg');em.textContent='未入力の必須項目があります：'+errs.join('、');em.style.display='block';return;}
  document.getElementById('err-msg').style.display='none';
  const members=[];
  for(let i=1;i<=config.maxMembers;i++){const val=v('m'+i);if(val)members.push(val);}
  const extra={};
  config.extraFields.forEach(f=>{const el=document.getElementById('ef-'+f.id);if(el)extra[f.id]=el.value.trim();});
  bands.push({id:Date.now(),band,unavail,allfree,rep,email,members,extra,status:'pending',createdAt:new Date().toISOString()});
  saveData();
  document.getElementById('f-band').value='';
  document.getElementById('f-allfree').checked=false;
  document.getElementById('f-unavail').value='';
  document.getElementById('unavail-text-wrap').style.display='block';
  document.getElementById('f-rep').value='';
  document.getElementById('f-email').value='';
  for(let i=1;i<=config.maxMembers;i++){const el=document.getElementById('m'+i);if(el)el.value='';}
  config.extraFields.forEach(f=>{const el=document.getElementById('ef-'+f.id);if(el)el.value='';});
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}

function setErr(id,isErr,errs,label){const el=document.getElementById(id);if(!el)return;if(isErr){el.classList.add('error');errs.push(label);}else el.classList.remove('error');}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
init();
</script>
</body>
</html>
